name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Copy assets to dist
        run: |
          mkdir -p dist/images dist/music dist/js
          cp -r src/images/* dist/images/
          cp -r src/music/* dist/music/
          cp -r src/js/* dist/js/
          cp index-sound-engineer.html dist/index.html

      - name: Build CSS
        run: npx sass src/scss/main.scss dist/css/main.css --style=compressed --no-source-map

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
